# Project-tunable devctl config. Every field has a safe default; tune
# per project instead of editing CLI code.

[compose]
# Compose file, repo-root-relative.
file = "tools/docker-compose.yml"
# Default service for `devctl shell` / `devctl run` / `devctl logs`.
default_service = "dev"
# COMPOSE_PROFILES (e.g. ["test"]). Empty = only profile-less services.
profiles = []

[test]
# `devctl test` runner. Stack-agnostic here; filled at bootstrap with the
# concrete runner. Policy (tagging, parallel-safety, long-lived test DB)
# lives in TESTING.md — read it before wiring these.
#
# Compose service the suite runs in (test profile, long-lived).
service = "test"
# --full / whole suite. Also the `devctl run` no-argv fallback.
# pytest:  "pytest -q"
# jest:    "npm test --"
# go:      "go test ./..."
command = "npx playwright test"
# --unit / fast tier only (empty → falls back to command).
# pytest:  "pytest -q -m unit"
# jest:    "npm test -- --selectProjects unit"
# go:      "go test -short ./..."
unit = "npx playwright test --grep @unit"
# --changed / impacted only. Playwright has NO native test-impact
# selector (TESTING.md "Selective execution policy"), and a changed-file
# list is mostly non-spec src files Playwright can't take as test paths,
# so the `{files}` token is intentionally NOT used here. The portable
# fallback is the area-tag scheme: a scoped change runs that module's
# area tag + the whole @unit tier (`--grep "@<area>|@unit"`). With no
# file→area map, the safe always-correct dev-loop default is the @unit
# fast tier; widen to `--grep "@<area>|@unit"` by hand when iterating on
# one area. Pre-commit/merge always run --full regardless.
changed = "npx playwright test --grep @unit --pass-with-no-tests"
# --ci / CI entrypoint (provider-agnostic; CI calls only this). Runs the
# FULL suite: it is the gate (TESTING.md "CI strategy": merge/main →
# full), and with no @unit specs yet a fast `--grep @unit` subset would
# match nothing — the smoke spec must actually run green here (TODO
# Epic 2). When the suite grows, a push/PR fast-vs-merge full split is a
# CI-workflow concern (no provider workflow committed; the plan named
# none) layered on top of this neutral entrypoint, not changed here.
ci = "npx playwright test --reporter=line"
# Appended when --parallel is given.
# pytest:  "-n auto"     (pytest-xdist)
# jest:    "--maxWorkers=50%"
# go:      "-p 4"
parallel = "--workers=50%"

[clean]
# Repo-root-relative dirs `devctl clean` may wipe. Must stay inside the
# repo root and may not be the root itself.
targets = ["tmp", "dist", "node_modules", "playwright-report", "test-results"]
