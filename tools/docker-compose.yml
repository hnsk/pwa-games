# Base stack. The only compose file devctl uses (path set in
# tools/devctl.toml [compose].file). No overlay merging by design — if a
# project needs extra service stacks (db, cache, a prod variant), add
# them here or in a second compose file and point devctl.toml at it.
#
# Env exported by `devctl`:
#   DEVCTL_ROOT   absolute host path to the repo root (bind-mounted to /work)

name: app

x-dev-image: &dev_image
  build:
    context: ./docker
    dockerfile: Dockerfile.dev
  image: app-dev:latest
  working_dir: /work
  volumes:
    - "${DEVCTL_ROOT:-..}:/work"

services:
  # Vite dev server. `devctl compose up -d` (skill dc-up) builds the
  # image, installs deps, and serves the app at http://localhost:5173.
  # Source is bind-mounted so host edits hot-reload. node_modules lives
  # in a named volume (the repo bind-mount would otherwise shadow it
  # onto the host); `devctl run` reuses the same volume, so a one-shot
  # `dc-run build` / `preview` sees the installed deps.
  #
  #   build:   tools/scripts/run -- npm run build      (skill dc-run)
  #   preview: tools/scripts/run -- npm run preview     (port 4173)
  dev:
    <<: *dev_image
    volumes:
      - "${DEVCTL_ROOT:-..}:/work"
      - dev-cache:/cache
      - node-modules:/work/node_modules
    # Host ports offset (5173/4173 are often taken by other local Vite
    # projects). Container ports stay Vite-default. Override the host
    # side with DEV_PORT / PREVIEW_PORT if 5180/4180 also collide.
    ports:
      - "${DEV_PORT:-5180}:5173"
      - "${PREVIEW_PORT:-4180}:4173"
    command: ["sh", "-lc", "npm install && npm run dev"]

  # Test runner. Same image; opt-in via the `test` profile so a bare
  # `up` doesn't start it. `devctl test` (skill dc-test) runs here.
  test:
    <<: *dev_image
    profiles: ["test"]
    command: ["sleep", "infinity"]

  # Long-lived test DB — uncomment if the project needs one. Per
  # TESTING.md it is started ONCE and NEVER restarted per run; state is
  # reset between tests by TRUNCATE / transaction-rollback, NOT by
  # recreating this container. Parallel workers isolate via a
  # schema/database each, not a shared one. Pin the latest stable image
  # tag at bootstrap (verify from Docker Hub; don't trust training memory).
  # test-db:
  #   image: postgres:<latest-stable>
  #   profiles: ["test"]
  #   environment:
  #     POSTGRES_PASSWORD: test
  #     POSTGRES_DB: app_test
  #   volumes:
  #     - test-db-data:/var/lib/postgresql/data
  #   tmpfs:
  #     - /tmp

volumes:
  dev-cache:
  node-modules:
  # test-db-data:
