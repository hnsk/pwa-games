# Base stack. The only compose file devctl uses (path set in
# tools/devctl.toml [compose].file). No overlay merging by design — if a
# project needs extra service stacks (db, cache, a prod variant), add
# them here or in a second compose file and point devctl.toml at it.
#
# Env exported by `devctl`:
#   DEVCTL_ROOT   absolute host path to the repo root (bind-mounted to /work)

name: app

x-dev-image: &dev_image
  build:
    context: ./docker
    dockerfile: Dockerfile.dev
  image: app-dev:latest
  working_dir: /work
  volumes:
    - "${DEVCTL_ROOT:-..}:/work"

services:
  # Vite dev server. `devctl compose up -d` (skill dc-up) builds the
  # image, installs deps, and serves the app at http://localhost:5173.
  # Source is bind-mounted so host edits hot-reload. node_modules lives
  # in a named volume (the repo bind-mount would otherwise shadow it
  # onto the host); `devctl run` reuses the same volume, so a one-shot
  # `dc-run build` / `preview` sees the installed deps.
  #
  #   build:   tools/scripts/run -- npm run build      (skill dc-run)
  #   preview: tools/scripts/run -- npm run preview     (port 4173)
  dev:
    <<: *dev_image
    volumes:
      - "${DEVCTL_ROOT:-..}:/work"
      - dev-cache:/cache
      - node-modules:/work/node_modules
    # Host ports offset (5173/4173 are often taken by other local Vite
    # projects). Container ports stay Vite-default. Override the host
    # side with DEV_PORT / PREVIEW_PORT if 5180/4180 also collide.
    ports:
      - "${DEV_PORT:-5180}:5173"
      - "${PREVIEW_PORT:-4180}:4173"
    # The `test` service reaches the app over the compose network by
    # hostname. The service name `dev` is UNUSABLE for that: `.dev` is in
    # Chrome's preloaded HSTS list, so Chromium force-upgrades
    # `http://dev:5173` to HTTPS and fails with ERR_SSL_PROTOCOL_ERROR
    # (node fetch ignores HSTS, hence diagnostics looked fine). Expose a
    # non-preloaded alias `web`; playwright.config.ts baseURL uses it.
    networks:
      default:
        aliases: ["web"]
    command: ["sh", "-lc", "npm install && npm run dev"]
    # Node 24 has global fetch; the dev image has no curl. `test`
    # waits on this so a run never races an unready Vite server.
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  # Production-build preview server (Vite `preview` over the real
  # `dist/`). The PWA is offline-capable ONLY in a build: the service
  # worker precaches the hashed assets that exist only after
  # `vite build`. The dev server has none of that, so tests/pwa.spec.ts
  # MUST run against this service, not `dev`. Long-lived like `dev`
  # (TESTING.md: supporting services are never per-run-restarted): it
  # builds once on start, then serves. Reachable on the compose network
  # at http://web-preview:4173 (non-HSTS alias, same reason as `web`).
  # Shares the dev image + `node-modules` volume; writes `dist/` into
  # the repo bind-mount.
  preview:
    <<: *dev_image
    volumes:
      - "${DEVCTL_ROOT:-..}:/work"
      - dev-cache:/cache
      - node-modules:/work/node_modules
    ports:
      - "${PWA_PREVIEW_PORT:-4181}:4173"
    networks:
      default:
        aliases: ["web-preview"]
    # PWA_HTTPS=1 → vite.config includes basic-ssl so `preview` is HTTPS
    # (a SW needs a secure context; the compose hostname can't get a
    # real cert). Self-signed → Playwright uses ignoreHTTPSErrors.
    environment:
      PWA_HTTPS: "1"
    command:
      ["sh", "-lc", "npm install && npm run build && npm run preview"]
    # npm install + vite build runs before `preview` serves; the long
    # start_period + retry budget covers a cold build so `test`
    # (depends_on: service_healthy) only starts once it actually serves.
    # HTTPS + self-signed → disable TLS verification for the probe only.
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "process.env.NODE_TLS_REJECT_UNAUTHORIZED='0';fetch('https://localhost:4173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  # Playwright test runner. NOT the dev image — uses the official
  # Microsoft Playwright image which bakes the browsers + their system
  # deps at /ms-playwright (PLAYWRIGHT_BROWSERS_PATH set in the image).
  # Long-lived (`sleep infinity`) and opt-in via the `test` profile, so a
  # bare `up` never starts it and `devctl test` does NOT recreate it or
  # the `dev` service per run (TESTING.md: supporting services are
  # long-lived, never per-run-restarted).
  #
  # Image tag pinned to the @playwright/test version: the npm package and
  # the browser image MUST match. Verified 2026-05-18:
  #   npm @playwright/test → 1.60.0
  #   mcr.microsoft.com/v2/playwright/tags/list → v1.60.0-noble exists
  # Bump both together (package.json devDependency + this tag).
  #
  # Shares the `node-modules` volume with `dev`/`run`: `dev` runs
  # `npm install` (installs @playwright/test 1.60.0 from package.json);
  # the browsers come from the image, so this service only needs the npm
  # package present. `depends_on: dev` so `devctl test` brings the
  # app-under-test up (reachable on the compose network at
  # http://dev:5173 — see playwright.config.ts baseURL).
  test:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    profiles: ["test"]
    working_dir: /work
    volumes:
      - "${DEVCTL_ROOT:-..}:/work"
      - node-modules:/work/node_modules
    depends_on:
      dev:
        condition: service_healthy
      preview:
        condition: service_healthy
    command: ["sleep", "infinity"]

  # Long-lived test DB — uncomment if the project needs one. Per
  # TESTING.md it is started ONCE and NEVER restarted per run; state is
  # reset between tests by TRUNCATE / transaction-rollback, NOT by
  # recreating this container. Parallel workers isolate via a
  # schema/database each, not a shared one. Pin the latest stable image
  # tag at bootstrap (verify from Docker Hub; don't trust training memory).
  # test-db:
  #   image: postgres:<latest-stable>
  #   profiles: ["test"]
  #   environment:
  #     POSTGRES_PASSWORD: test
  #     POSTGRES_DB: app_test
  #   volumes:
  #     - test-db-data:/var/lib/postgresql/data
  #   tmpfs:
  #     - /tmp

volumes:
  dev-cache:
  node-modules:
  # test-db-data:
