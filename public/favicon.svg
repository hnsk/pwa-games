<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img"
     aria-label="PWA Games">
  <!-- Source for @vite-pwa/assets-generator (minimal-2023 preset).
       Neon-cabinet look matching the shell design tokens:
       bg #07080d, cyan #36e6df, magenta #ff3d8b. All glyph content is
       kept inside a ~80% central safe zone so the maskable variant is
       not clipped on Android adaptive icons. -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#07080d" />
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="2" />

  <!-- tic-tac-toe grid: the host's first game, doubles as a "games" mark -->
  <g filter="url(#glow)" stroke-linecap="round">
    <g stroke="#36e6df" stroke-width="14" stroke-opacity="0.85">
      <line x1="218" y1="140" x2="218" y2="372" />
      <line x1="294" y1="140" x2="294" y2="372" />
      <line x1="140" y1="218" x2="372" y2="218" />
      <line x1="140" y1="294" x2="372" y2="294" />
    </g>
    <!-- X (magenta) top-left, O (cyan) center -->
    <g stroke="#ff3d8b" stroke-width="18">
      <line x1="158" y1="158" x2="200" y2="200" />
      <line x1="200" y1="158" x2="158" y2="200" />
    </g>
    <circle cx="256" cy="256" r="26" fill="none" stroke="#36e6df"
            stroke-width="18" />
  </g>
</svg>
